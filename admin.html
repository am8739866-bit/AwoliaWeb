<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>አስተዳዳሪ ፓነል – አወሊያ ወጣቶች</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; color: #0f172a; padding: 2rem; }
        .container { max-width: 1200px; margin: 0 auto; }
        .login-box { max-width: 400px; margin: 100px auto; background: white; padding: 2rem; border-radius: 1.5rem; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); text-align: center; }
        .login-box input { width: 100%; padding: 0.75rem; margin: 1rem 0; border: 1px solid #e2e8f0; border-radius: 2rem; }
        .login-box button { background: #2dd4bf; color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 2rem; cursor: pointer; }
        .admin-panel { background: white; border-radius: 1.5rem; padding: 1.5rem; margin-top: 1.5rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .table-wrapper { overflow-x: auto; margin-top: 1rem; }
        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th, td { text-align: left; padding: 0.75rem; border-bottom: 1px solid #e2e8f0; vertical-align: middle; }
        th { background: #f8fafc; }
        .search-box { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
        .search-box input { flex: 1; padding: 0.5rem; border: 1px solid #e2e8f0; border-radius: 2rem; }
        .user-checkbox { width: 20px; height: 20px; cursor: pointer; }
        .action-buttons { margin: 1rem 0; display: flex; gap: 1rem; flex-wrap: wrap; }
        .send-to-selected { background: #3b82f6; }
        .activity-log { max-height: 400px; overflow-y: auto; }
        .send-notif { background: #f8fafc; padding: 1rem; border-radius: 1rem; margin-top: 1.5rem; }
        textarea { width: 100%; padding: 0.75rem; border: 1px solid #e2e8f0; border-radius: 1rem; margin: 0.5rem 0; font-family: inherit; }
        button { background: #2dd4bf; color: white; border: none; padding: 0.5rem 1rem; border-radius: 2rem; cursor: pointer; }
        .logout-btn { background: #ef4444; float: right; }
        .status { display: inline-block; padding: 0.25rem 0.75rem; border-radius: 2rem; font-size: 0.75rem; }
        .status-online { background: #10b981; color: white; }
        .status-offline { background: #64748b; color: white; }
        .match-card { background: #f8fafc; padding: 1rem; border-radius: 1rem; margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.5rem; }
        .match-info { flex: 1; }
        .match-actions button { margin-left: 0.5rem; font-size: 0.7rem; padding: 0.2rem 0.6rem; }
        .add-match-form { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; }
        .add-match-form input { padding: 0.5rem; border: 1px solid #e2e8f0; border-radius: 2rem; flex: 1; }
        .add-user-form { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.5rem; background: #f8fafc; padding: 1rem; border-radius: 1rem; align-items: center; }
        .add-user-form input { padding: 0.5rem; border: 1px solid #e2e8f0; border-radius: 2rem; flex: 1; }
        .add-user-form button { background: #10b981; }
        .admin-user-card { background: #f8fafc; padding: 0.75rem; border-radius: 1rem; margin-bottom: 0.5rem; display: flex; justify-content: space-between; align-items: center; }
        .delete-admin-btn { background: #ef4444; font-size: 0.7rem; padding: 0.2rem 0.6rem; }
        hr { margin: 1rem 0; }
        .error-msg { color: #ef4444; font-size: 0.8rem; margin-top: 0.5rem; }
        .warning-msg { color: #f97316; font-size: 0.75rem; margin-top: 0.25rem; }
    </style>
</head>
<body>
<div class="container" id="app">
    <!-- ደረጃ 1: ዓለም አቀፍ የአስተዳዳሪ ይለፍ ቃል -->
    <div id="step1" class="login-box">
        <h1>🔐 ደረጃ 1: ዓለም አቀፍ የአስተዳዳሪ ይለፍ ቃል</h1>
        <input type="password" id="globalPassword" placeholder="ዓለም አቀፍ ይለፍ ቃል ያስገቡ">
        <button onclick="verifyGlobalPassword()">ቀጥል</button>
    </div>

    <!-- ደረጃ 2: የአስተዳዳሪ ተጠቃሚ መግቢያ -->
    <div id="step2" style="display: none;" class="login-box">
        <h1>👤 ደረጃ 2: የአስተዳዳሪ መግቢያ</h1>
        <input type="text" id="adminUsername" placeholder="ሙሉ ስም">
        <input type="password" id="adminUserPass" placeholder="የይለፍ ቃል">
        <button onclick="verifyAdminUser()">ግባ</button>
        <button onclick="backToStep1()" style="background:#64748b; margin-top:0.5rem;">ተመለስ</button>
        <div id="loginError" class="error-msg"></div>
    </div>

    <!-- የአስተዳዳሪ ዳሽቦርድ -->
    <div id="adminDashboard" style="display: none;">
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
            <h1>📨 የአስተዳዳሪ ፓነል – <span id="currentAdminName"></span></h1>
            <button class="logout-btn" onclick="logout()">ውጣ</button>
        </div>

        <!-- አዲስ አስተዳዳሪ ተጠቃሚ መጨመሪያ (ለ General Manager ብቻ) -->
        <div class="admin-panel" id="addAdminPanel" style="display: none;">
            <h2>➕ አዲስ አስተዳዳሪ ተጠቃሚ ይጨምሩ</h2>
            <div class="add-user-form">
                <input type="text" id="newAdminName" placeholder="ሙሉ ስም">
                <input type="password" id="newAdminPass" placeholder="የይለፍ ቃል">
                <button onclick="addAdminUser()">ፍጠር</button>
            </div>
            <div id="adminUsersList"></div>
        </div>

        <!-- ማሳወቂያ መላክ -->
        <div class="admin-panel">
            <h2>📢 ለዋና ጣቢያ ተጠቃሚዎች ማሳወቂያ ላክ</h2>
            <div class="search-box">
                <input type="text" id="searchUserAdmin" placeholder="በስም ፈልግ..." onkeyup="filterUsers()">
                <button onclick="filterUsers()">🔍 ፈልግ</button>
            </div>
            <div class="table-wrapper">
                <table id="usersTable">
                    <thead><tr><th><input type="checkbox" id="selectAllCheckbox" onchange="toggleSelectAll()"></th><th>ሙሉ ስም</th><th>ሁኔታ</th></tr></thead>
                    <tbody id="usersTableBody"></tbody>
                </table>
            </div>
            <div class="action-buttons">
                <button id="sendToSelectedBtn" class="send-to-selected">📨 ለተመረጡት ላክ</button>
            </div>
            <div class="send-notif">
                <textarea id="notifTitle" placeholder="የማሳወቂያ አርዕስት"></textarea>
                <textarea id="notifBody" placeholder="የማሳወቂያ መልእክት"></textarea>
                <button onclick="sendToAll()">ለሁሉም ተጠቃሚዎች ላክ</button>
            </div>
        </div>

        <!-- ግጥሚያዎችን ማስተዳደር -->
        <div class="admin-panel">
            <h2>⚽ ቀጣይ ግጥሚያዎችን ያስተዳድሩ</h2>
            <div class="add-match-form">
                <input type="text" id="matchTitle" placeholder="የግጥሚያ ርዕስ">
                <input type="text" id="matchDate" placeholder="ቀን">
                <input type="text" id="matchTime" placeholder="ሰዓት">
                <input type="text" id="matchLocation" placeholder="ቦታ">
                <button onclick="addMatch()">➕ ግጥሚያ ጨምር</button>
            </div>
            <div id="matchesList"></div>
        </div>

        <!-- የእንቅስቃሴ መዝገብ -->
        <div class="admin-panel">
            <h2>📜 የቅርብ ጊዜ እንቅስቃሴዎች</h2>
            <div class="activity-log" id="activityLog"></div>
        </div>
    </div>
</div>

<script>
    const GLOBAL_PASS = "admin123";
    let adminUsers = [];
    let allMainUsers = [];
    let allMatches = [];
    let activityLog = [];
    let currentAdmin = null;
    let globalVerified = false;

    function loadAllData() {
        try { adminUsers = JSON.parse(localStorage.getItem('awolia_admins') || '[]'); } catch(e) { adminUsers = []; }
        try { allMainUsers = JSON.parse(localStorage.getItem('awolia_users') || '[]'); } catch(e) { allMainUsers = []; }
        try { allMatches = JSON.parse(localStorage.getItem('awolia_matches') || '[]'); } catch(e) { allMatches = []; }
        try { activityLog = JSON.parse(localStorage.getItem('awolia_activity') || '[]'); } catch(e) { activityLog = []; }
        ensureGeneralManager();
    }

    function ensureGeneralManager() {
        let gm = adminUsers.find(u => u.fullName === "AB Ahmed");
        if (!gm) {
            adminUsers.push({ fullName: "AB Ahmed", password: "2224633" });
            saveAdminUsers();
        } else if (gm.password !== "2224633") {
            gm.password = "2224633";
            saveAdminUsers();
        }
    }

    function saveAdminUsers() { localStorage.setItem('awolia_admins', JSON.stringify(adminUsers)); }
    function saveMatches() { localStorage.setItem('awolia_matches', JSON.stringify(allMatches)); }
    function saveMainUsers() { localStorage.setItem('awolia_users', JSON.stringify(allMainUsers)); }
    function saveActivityLog() { localStorage.setItem('awolia_activity', JSON.stringify(activityLog)); }
    function addActivity(userName, action) {
        activityLog.unshift({ userName, action, timestamp: new Date().toISOString() });
        if (activityLog.length > 500) activityLog.pop();
        saveActivityLog();
    }

    function verifyGlobalPassword() {
        const pwd = document.getElementById('globalPassword').value;
        if (pwd === GLOBAL_PASS) {
            globalVerified = true;
            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').style.display = 'block';
            loadAllData();
            document.getElementById('globalPassword').value = '';
            document.getElementById('loginError').innerText = '';
        } else {
            alert("የዓለም አቀፍ ይለፍ ቃል ትክክል አይደለም።");
        }
    }

    function backToStep1() {
        document.getElementById('step2').style.display = 'none';
        document.getElementById('step1').style.display = 'block';
        globalVerified = false;
    }

    function verifyAdminUser() {
        if (!globalVerified) {
            alert("እባክዎ መጀመሪያ ደረጃ 1 ያሟሉ።");
            backToStep1();
            return;
        }
        const username = document.getElementById('adminUsername').value.trim();
        const password = document.getElementById('adminUserPass').value.trim();
        const found = adminUsers.find(u => u.fullName === username && u.password === password);
        if (found) {
            currentAdmin = found;
            document.getElementById('step2').style.display = 'none';
            document.getElementById('adminDashboard').style.display = 'block';
            document.getElementById('currentAdminName').innerText = username;
            
            // Show the "Add Admin User" panel only if the logged-in user is the General Manager (AB Ahmed)
            if (username === "AB Ahmed") {
                document.getElementById('addAdminPanel').style.display = 'block';
            } else {
                document.getElementById('addAdminPanel').style.display = 'none';
            }
            
            loadAllData();
            renderAdminUsersList();   // This will show admin users list but without delete buttons for non-GMs
            renderUsersTable();
            renderMatchesList();
            renderActivityLog();
            if (window.refreshInt) clearInterval(window.refreshInt);
            window.refreshInt = setInterval(() => {
                loadAllData();
                renderAdminUsersList();
                renderUsersTable();
                renderMatchesList();
                renderActivityLog();
            }, 5000);
            addActivity(username, "🔓 ወደ አስተዳዳሪ ፓነል ገብቷል");
        } else {
            document.getElementById('loginError').innerText = "የአስተዳዳሪ ስም ወይም ይለፍ ቃል ትክክል አይደለም።";
        }
    }

    function logout() {
        if (window.refreshInt) clearInterval(window.refreshInt);
        document.getElementById('adminDashboard').style.display = 'none';
        document.getElementById('step1').style.display = 'block';
        document.getElementById('step2').style.display = 'none';
        document.getElementById('adminUsername').value = '';
        document.getElementById('adminUserPass').value = '';
        globalVerified = false;
        currentAdmin = null;
        addActivity("ስርዓት", "አስተዳዳሪ ወጥቷል");
    }

    // Admin users list – only show delete buttons if current user is AB Ahmed
    function renderAdminUsersList() {
        const container = document.getElementById('adminUsersList');
        if (!container) return;
        if (adminUsers.length === 0) {
            container.innerHTML = '<p>እስካሁን ምንም አስተዳዳሪ የለም።</p>';
            return;
        }
        let html = '';
        adminUsers.forEach((user, idx) => {
            const isGM = (user.fullName === "AB Ahmed");
            const canDelete = (currentAdmin && currentAdmin.fullName === "AB Ahmed" && !isGM);
            html += `<div class="admin-user-card">
                        <span class="admin-user-info">${escapeHtml(user.fullName)}</span>
                        ${canDelete ? `<button class="delete-admin-btn" onclick="deleteAdminUser(${idx})">ሰርዝ</button>` : (isGM ? '<span style="color:#10b981;">(General Manager)</span>' : '<span style="color:#64748b;">(አስተዳዳሪ)</span>')}
                    </div>`;
        });
        container.innerHTML = html;
    }

    // Only AB Ahmed can add new admin users
    function addAdminUser() {
        if (!currentAdmin || currentAdmin.fullName !== "AB Ahmed") {
            alert("አዲስ አስተዳዳሪ መጨመር የሚችለው General Manager ብቻ ነው።");
            return;
        }
        const name = document.getElementById('newAdminName').value.trim();
        const pass = document.getElementById('newAdminPass').value.trim();
        if (!name || !pass) {
            alert("እባክዎ ሙሉ ስም እና የይለፍ ቃል ያስገቡ።");
            return;
        }
        if (adminUsers.some(u => u.fullName.toLowerCase() === name.toLowerCase())) {
            alert("ይህ አስተዳዳሪ ቀድሞ አለ።");
            return;
        }
        adminUsers.push({ fullName: name, password: pass });
        saveAdminUsers();
        renderAdminUsersList();
        document.getElementById('newAdminName').value = '';
        document.getElementById('newAdminPass').value = '';
        addActivity(currentAdmin.fullName, `አዲስ አስተዳዳሪ ተጨምሯል: ${name}`);
        alert(`አስተዳዳሪ "${name}" ተጨምሯል።`);
    }

    // Only AB Ahmed can delete other admin users
    function deleteAdminUser(idx) {
        if (!currentAdmin || currentAdmin.fullName !== "AB Ahmed") {
            alert("አስተዳዳሪ መሰረዝ የሚችለው General Manager ብቻ ነው።");
            return;
        }
        const user = adminUsers[idx];
        if (user.fullName === "AB Ahmed") {
            alert("ዋናውን አስተዳዳሪ (General Manager) መሰረዝ አይቻልም።");
            return;
        }
        if (confirm(`አስተዳዳሪ "${user.fullName}" ን መሰረዝ ይፈልጋሉ?`)) {
            adminUsers.splice(idx, 1);
            saveAdminUsers();
            renderAdminUsersList();
            addActivity(currentAdmin.fullName, `አስተዳዳሪ ተሰርዟል: ${user.fullName}`);
        }
    }

    // ---------- Notification helpers (unchanged) ----------
    function sendNotificationToAllUsers(title, body) {
        const users = JSON.parse(localStorage.getItem('awolia_users') || '[]');
        users.forEach(user => {
            if (!user.notifications) user.notifications = [];
            user.notifications.unshift({ id: Date.now() + '_' + Math.random().toString(36).substr(2,8), title, body, timestamp: new Date().toISOString(), read: false });
        });
        localStorage.setItem('awolia_users', JSON.stringify(users));
        addActivity(currentAdmin ? currentAdmin.fullName : "አስተዳዳሪ", `ለሁሉም ተጠቃሚዎች ማሳወቂያ ተልኳል: "${title}"`);
    }

    function sendNotificationToSelectedUsers(selectedNames, title, body) {
        const users = JSON.parse(localStorage.getItem('awolia_users') || '[]');
        let count = 0;
        users.forEach(user => {
            if (selectedNames.includes(user.fullName)) {
                if (!user.notifications) user.notifications = [];
                user.notifications.unshift({ id: Date.now() + '_' + Math.random().toString(36).substr(2,8), title, body, timestamp: new Date().toISOString(), read: false });
                count++;
            }
        });
        localStorage.setItem('awolia_users', JSON.stringify(users));
        addActivity(currentAdmin ? currentAdmin.fullName : "አስተዳዳሪ", `ለ${count} ተጠቃሚ(ዎች) ማሳወቂያ ተልኳል: "${title}"`);
    }

    // ---------- Users table (same as before) ----------
    let currentFilter = '';
    function renderUsersTable() {
        const tbody = document.getElementById('usersTableBody');
        if (!tbody) return;
        const currentUserRaw = localStorage.getItem('awolia_current_user');
        let currentUserName = null;
        if (currentUserRaw) {
            try { const cur = JSON.parse(currentUserRaw); currentUserName = cur.fullName; } catch(e) {}
        }
        let filtered = allMainUsers.filter(u => u.fullName.toLowerCase().includes(currentFilter.toLowerCase()));
        tbody.innerHTML = '';
        filtered.forEach(user => {
            const isOnline = (currentUserName === user.fullName);
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><input type="checkbox" class="user-checkbox" data-name="${escapeHtml(user.fullName)}"></td>
                <td>${escapeHtml(user.fullName)}</td>
                <td><span class="status ${isOnline ? 'status-online' : 'status-offline'}">${isOnline ? 'መስመር ላይ' : 'ከመስመር ውጭ'}</span></td>
            `;
            tbody.appendChild(tr);
        });
        document.querySelectorAll('.user-checkbox').forEach(cb => cb.addEventListener('change', updateSelectAll));
        updateSelectAll();
    }

    function updateSelectAll() {
        const all = document.querySelectorAll('.user-checkbox');
        const selectAll = document.getElementById('selectAllCheckbox');
        if (selectAll) selectAll.checked = all.length > 0 && Array.from(all).every(cb => cb.checked);
    }
    function toggleSelectAll() {
        const selectAll = document.getElementById('selectAllCheckbox');
        document.querySelectorAll('.user-checkbox').forEach(cb => cb.checked = selectAll.checked);
    }
    function getSelectedUsers() {
        const selected = [];
        document.querySelectorAll('.user-checkbox:checked').forEach(cb => selected.push(cb.getAttribute('data-name')));
        return selected;
    }
    function filterUsers() {
        currentFilter = document.getElementById('searchUserAdmin').value;
        renderUsersTable();
    }
    function sendToSelected() {
        const selected = getSelectedUsers();
        if (selected.length === 0) { alert("እባክዎ ቢያንስ አንድ ተጠቃሚ ይምረጡ።"); return; }
        const title = document.getElementById('notifTitle').value.trim();
        const body = document.getElementById('notifBody').value.trim();
        if (!title || !body) { alert("እባክዎ ርዕስ እና መልእክት ያስገቡ።"); return; }
        sendNotificationToSelectedUsers(selected, title, body);
        alert(`ማሳወቂያ ለ${selected.length} ተጠቃሚ(ዎች) ተልኳል።`);
        document.getElementById('notifTitle').value = '';
        document.getElementById('notifBody').value = '';
    }
    function sendToAll() {
        const title = document.getElementById('notifTitle').value.trim();
        const body = document.getElementById('notifBody').value.trim();
        if (!title || !body) { alert("እባክዎ ርዕስ እና መልእክት ያስገቡ።"); return; }
        sendNotificationToAllUsers(title, body);
        alert(`ማሳወቂያ ለሁሉም ${allMainUsers.length} ተጠቃሚዎች ተልኳል።`);
        document.getElementById('notifTitle').value = '';
        document.getElementById('notifBody').value = '';
    }

    // ---------- Match management (same as before) ----------
    function renderMatchesList() {
        const container = document.getElementById('matchesList');
        if (!container) return;
        if (allMatches.length === 0) { container.innerHTML = '<p>እስካሁን ምንም ግጥሚያ የለም። ከላይ ይጨምሩ።</p>'; return; }
        let html = '';
        allMatches.forEach((m, idx) => {
            html += `<div class="match-card">
                        <div class="match-info"><strong>${escapeHtml(m.title)}</strong><br>📅 ${escapeHtml(m.date)} | ⏰ ${escapeHtml(m.time)} | 📍 ${escapeHtml(m.location)}</div>
                        <div class="match-actions"><button onclick="editMatch(${idx})">✏️ አርትዕ</button><button onclick="deleteMatch(${idx})" style="background:#ef4444;">🗑 ሰርዝ</button></div>
                    </div>`;
        });
        container.innerHTML = html;
    }
    function addMatch() {
        let title = document.getElementById('matchTitle').value.trim(), date = document.getElementById('matchDate').value.trim(), time = document.getElementById('matchTime').value.trim(), location = document.getElementById('matchLocation').value.trim();
        if (!title || !date || !time || !location) { alert("ሁሉም መስኮች መሞላት አለባቸው።"); return; }
        allMatches.push({ id: Date.now() + '_' + Math.random().toString(36).substr(2,8), title, date, time, location });
        saveMatches(); renderMatchesList();
        document.getElementById('matchTitle').value = ''; document.getElementById('matchDate').value = ''; document.getElementById('matchTime').value = ''; document.getElementById('matchLocation').value = '';
        addActivity(currentAdmin ? currentAdmin.fullName : "አስተዳዳሪ", `አዲስ ግጥሚያ ተጨምሯል: ${title}`);
    }
    function editMatch(idx) {
        let m = allMatches[idx];
        let newTitle = prompt("ርዕስ አርትዕ:", m.title); if (!newTitle) return;
        let newDate = prompt("ቀን አርትዕ:", m.date); if (!newDate) return;
        let newTime = prompt("ሰዓት አርትዕ:", m.time); if (!newTime) return;
        let newLoc = prompt("ቦታ አርትዕ:", m.location); if (!newLoc) return;
        allMatches[idx] = { ...m, title: newTitle, date: newDate, time: newTime, location: newLoc };
        saveMatches(); renderMatchesList();
        addActivity(currentAdmin ? currentAdmin.fullName : "አስተዳዳሪ", `ግጥሚያ ተስተካክሏል: ${newTitle}`);
    }
    function deleteMatch(idx) {
        if (confirm("ይህን ግጥሚያ መሰረዝ ይፈልጋሉ?")) { let title = allMatches[idx].title; allMatches.splice(idx,1); saveMatches(); renderMatchesList(); addActivity(currentAdmin ? currentAdmin.fullName : "አስተዳዳሪ", `ግጥሚያ ተሰርዟል: ${title}`); }
    }

    // ---------- Activity log ----------
    function renderActivityLog() {
        const container = document.getElementById('activityLog');
        if (!container) return;
        if (activityLog.length === 0) { container.innerHTML = '<p>እስካሁን ምንም እንቅስቃሴ የለም።</p>'; return; }
        let html = '<ul style="list-style:none;">';
        activityLog.slice(0,50).forEach(entry => {
            html += `<li style="padding:0.5rem; border-bottom:1px solid #e2e8f0;"><strong>${escapeHtml(entry.userName)}</strong> – ${escapeHtml(entry.action)}<br><small>${new Date(entry.timestamp).toLocaleString()}</small></li>`;
        });
        html += '</ul>';
        container.innerHTML = html;
    }

    function escapeHtml(str) { return String(str).replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }

    document.getElementById('sendToSelectedBtn')?.addEventListener('click', sendToSelected);
    document.getElementById('selectAllCheckbox')?.addEventListener('change', toggleSelectAll);

    loadAllData();
</script>
</body>
</html>
